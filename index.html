function el(tag,at,ch){
  const e=document.createElement(tag);
  if(at)Object.entries(at).forEach(([k,v])=>{
    if(k==="style"&&typeof v==="object")Object.assign(e.style,v);
    else if(k==="onClick")e.addEventListener("click",v);
    else if(k==="value"&&tag==="input")e.value=v;
    else if(k==="placeholder")e.placeholder=v;
    else if(k==="type")e.type=v;
    else e[k]=v;
  });
  [ch].flat().filter(c=>c!=null&&c!==false).forEach(c=>
    e.appendChild(typeof c==="string"?document.createTextNode(c):c));
  return e;
}

// в”Җв”Җв”Җ API йҖЈз·ҡжё¬и©Ұ в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
async function testApiConnection(key,proxyUrl){
  const endpoint=(proxyUrl||"").trim()||"https://api.anthropic.com/v1/messages";
  try{
    const resp=await fetch(endpoint,{
      method:"POST",
      headers:{"Content-Type":"application/json","x-api-key":key.trim(),"anthropic-version":"2023-06-01"},
      body:JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:10,
        messages:[{role:"user",content:"Hi"}]})
    });
    if(resp.status===401)return{ok:false,msg:"вқҢ API Key з„Ўж•ҲжҲ–е·ІйҒҺжңҹпјҢи«ӢйҮҚж–°з”іи«Ӣ"};
    if(resp.status===403)return{ok:false,msg:"вқҢ API Key з„ЎеӯҳеҸ–ж¬Ҡйҷҗ"};
    if(resp.ok)return{ok:true,msg:`вң… йҖЈз·ҡжҲҗеҠҹпјҒ${endpoint.includes("anthropic.com")?"пјҲзӣҙйҖЈпјү":"пјҲз¶“д»ЈзҗҶпјү"}`};
    return{ok:false,msg:`вқҢ HTTP ${resp.status} йҢҜиӘӨ`};
  }catch(e){
    if(e instanceof TypeError)
      return{ok:false,msg:"вқҢ зӣҙйҖЈеӨұж•—пјҲCORS/йҳІзҒ«зүҶпјү\nвҶ’ и«ӢеЎ«е…Ҙ Cloudflare Worker д»ЈзҗҶз¶ІеқҖеҫҢеҶҚжё¬и©Ұ"};
    return{ok:false,msg:`вқҢ йҖЈз·ҡйҢҜиӘӨпјҡ${e.message}`};
  }
}

// в”Җв”Җв”Җ зІҫзўәйҢҜиӘӨиӯҳеҲҘ в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
function friendlyError(e){
  if(e instanceof TypeError||e.message==="Failed to fetch")
    return "з¶Іи·ҜйҖЈз·ҡеӨұж•—пјҲFailed to fetchпјү\n\nеҸҜиғҪеҺҹеӣ пјҡ\nвҖў з¶Іи·ҜдёҚз©©пјҢи«ӢзЁҚеҫҢеҶҚи©Ұ\nвҖў йҳІзҒ«зүҶ/д»ЈзҗҶж””жҲӘ api.anthropic.com\nвҖў и«Ӣй»һрҹ”‘жҢүйҲ•вҶ’гҖҢжё¬и©ҰйҖЈз·ҡгҖҚзўәиӘҚ";
  if(e.message.includes("401"))return "API Key з„Ўж•ҲжҲ–йҒҺжңҹпјҢи«ӢйҮҚж–°иЁӯе®ҡ";
  if(e.message.includes("403"))return "API Key з„ЎеӯҳеҸ–ж¬Ҡйҷҗ";
  if(e.message.includes("429"))return "API и«ӢжұӮйҒҺж–јй »з№ҒпјҢи«ӢзЁҚеҫҢеҶҚи©Ұ";
  if(e.message==="NO_KEY")return "е°ҡжңӘиЁӯе®ҡ API Key";
  return e.message;
}

async function doLLM(){
  if(!ST.query.trim()||ST.loading)return;
  if(!getKey()){showKeyModal(doLLM);return;}
  ST.loading=true;ST.llm=null;render();
  try{ST.llm=await queryLLM(ST.query);}
  catch(e){
    if(e.message==="NO_KEY"){showKeyModal(doLLM);ST.loading=false;render();return;}
    ST.llm={category:"йҢҜиӘӨ",recommendations:[],notes:friendlyError(e),mall_tip:null};
  }
  ST.loading=false;render();
}

async function doLiveSearch(){
  if(!ST.query.trim()||ST.liveLoading)return;
  if(!getKey()){showKeyModal(doLiveSearch);return;}
  ST.liveLoading=true;ST.live=null;render();
  try{ST.live=await liveSearchPromos(ST.query);}
  catch(e){
    if(e.message==="NO_KEY"){showKeyModal(doLiveSearch);ST.liveLoading=false;render();return;}
    ST.live={promos:[],summary:friendlyError(e),merchant_promo:null};
  }
  ST.liveLoading=false;render();
}
