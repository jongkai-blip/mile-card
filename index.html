const MEDAL=["🏆","🥈","🥉","④","⑤","⑥"];
function el(tag,attrs,children){
  const e=document.createElement(tag);
  if(attrs)Object.entries(attrs).forEach(([k,v])=>{
    if(k==="style"&&typeof v==="object")Object.assign(e.style,v);
    else if(k==="onClick")e.addEventListener("click",v);
    else if(k==="value"){e.value=v;}
    else if(k==="placeholder"){e.placeholder=v;}
    else e[k]=v;
  });
  (Array.isArray(children)?children:[children]).forEach(c=>{
    if(c==null||c===false)return;
    e.appendChild(typeof c==="string"?document.createTextNode(c):c);
  });
  return e;
}
function scoreBar(score){
  const color=score>=9?"#4ade80":score>=7?"#60a5fa":score>=4?"#fbbf24":"#6b7280";
  const d=el("div",{style:{display:"flex",gap:"2px",alignItems:"center",marginTop:"2px"}});
  for(let i=0;i<10;i++){
    d.appendChild(el("div",{style:{width:"4px",height:"6px",borderRadius:"2px",flexShrink:"0",
      background:i<score?color:"rgba(255,255,255,0.1)"}}));
  }return d;
}
function cardTag(id){

}

      if(state.llm.mall_tip)ai.appendChild(el("div",{className:"box",style:{background:"rgba(251,191,36,0.1)",border:"1px solid rgba(251,191,36,0.3)",color:"#fde68a"}},`✈ ${state.llm.mall_tip}`));
      (state.llm.recommendations||[]).forEach((r,i)=>{
        const row=el("div",{style:{background:"rgba(255,255,255,0.04)",border:"1px solid rgba(255,255,255,0.08)",borderRadius:"10px",padding:"10px 12px",marginBottom:"6px"}});
        const top=el("div",{style:{display:"flex",alignItems:"center",gap:"8px",marginBottom:"4px"}});
        top.appendChild(el("span",{style:{fontSize:i<3?"16px":"12px"}},MEDAL[i]));
        top.appendChild(el("span",{style:{fontSize:"13px",fontWeight:"700",color:"#a5b4fc"}},r.card));
        if(r.payment&&r.payment!=="直刷")top.appendChild(el("span",{style:{fontSize:"10px",color:"#6b7280",background:"rgba(255,255,255,0.05)",padding:"1px 6px",borderRadius:"6px"}},r.payment));
        row.appendChild(top);
        row.appendChild(el("div",{style:{fontSize:"13px",fontWeight:"700",color:"#4ade80",marginBottom:"2px"}},r.reward));
        row.appendChild(el("div",{style:{fontSize:"11px",color:"#9ca3af",lineHeight:"1.5"}},r.reason));
        ai.appendChild(row);
      });
      content.appendChild(ai);
    } else if(!state.query.trim()){
      const empty=el("div",{style:{textAlign:"center",padding:"30px 0"}});
      empty.appendChild(el("div",{style:{fontSize:"40px",marginBottom:"12px"}},"✈️"));
      empty.appendChild(el("div",{style:{fontSize:"13px",color:"#6b7280",marginBottom:"4px"}},"輸入任意消費場所"));
      empty.appendChild(el("div",{style:{fontSize:"11px",color:"#4b5563"}},"例：電信費、必勝客、日本、保費、家樂福…"));
      content.appendChild(empty);
    }
  } else { // browse tab
    if(state.sel){
      const backBar=el("div",{style:{display:"flex",alignItems:"center",gap:"8px",marginBottom:"12px"}});
      backBar.appendChild(el("button",{onClick:()=>{state.sel=null;render();},
        style:{background:"rgba(255,255,255,0.04)",border:"1px solid rgba(255,255,255,0.08)",borderRadius:"8px",padding:"4px 10px",fontSize:"12px",color:"#9ca3af"}},"← 返回"));
      backBar.appendChild(el("span",{style:{fontSize:"18px"}},state.sel.icon));
      backBar.appendChild(el("span",{style:{fontSize:"15px",fontWeight:"700"}},state.sel.name));
      content.appendChild(backBar);
      content.appendChild(scenarioPanel(state.sel));
    } else {
      GROUPS.forEach(group=>{
        const gDiv=el("div",{style:{marginBottom:"8px"}});
        const gBtn=el("button",{onClick:()=>{state.expG=state.expG===group.id?null:group.id;render();},
          style:{width:"100%",textAlign:"left",background:"rgba(255,255,255,0.04)",border:"1px solid rgba(255,255,255,0.08)",
            borderRadius:"12px",padding:"12px 14px",display:"flex",alignItems:"center",gap:"10px"}});
        gBtn.appendChild(el("span",{style:{fontSize:"20px"}},group.icon));
        gBtn.appendChild(el("span",{style:{fontSize:"14px",fontWeight:"700",color:"#e8eaf0"}},group.name));
        gBtn.appendChild(el("span",{style:{marginLeft:"auto",color:"#6b7280",fontSize:"16px"}},state.expG===group.id?"▲":"▼"));
        gDiv.appendChild(gBtn);
        if(state.expG===group.id){
          const gContent=el("div",{style:{marginTop:"4px",marginLeft:"8px"}});
          group.subs.forEach(sub=>{
            const scs=SCENARIOS.filter(s=>s.group===sub);
            if(!scs.length)return;
            const sDiv=el("div",{style:{marginBottom:"4px"}});
            const sBtn=el("button",{onClick:()=>{state.expS=state.expS===sub?null:sub;render();},
              style:{width:"100%",textAlign:"left",background:"rgba(255,255,255,0.02)",border:"1px solid rgba(255,255,255,0.08)",
                borderRadius:"10px",padding:"9px 12px",display:"flex",alignItems:"center",gap:"8px"}});
            sBtn.appendChild(el("span",{style:{fontSize:"11px",color:"#818cf8",fontWeight:"600"}},sub));
            sBtn.appendChild(el("span",{style:{fontSize:"10px",color:"#4b5563"}},`(${scs.length})`));
            sBtn.appendChild(el("span",{style:{marginLeft:"auto",color:"#6b7280",fontSize:"14px"}},state.expS===sub?"▲":"▼"));
            sDiv.appendChild(sBtn);
            if(state.expS===sub){
              const scContent=el("div",{style:{marginTop:"4px",marginLeft:"8px"}});
              scs.forEach(s=>{
                const btn=el("button",{onClick:()=>{state.sel=s;render();},
                  style:{width:"100%",textAlign:"left",background:"rgba(255,255,255,0.02)",border:"1px solid rgba(255,255,255,0.08)",
                    borderRadius:"8px",padding:"8px 12px",display:"flex",alignItems:"center",gap:"8px",marginBottom:"4px"}});
                btn.appendChild(el("span",{style:{fontSize:"16px"}},s.icon));
                btn.appendChild(el("span",{style:{fontSize:"13px",color:"#d1d5db"}},s.name));
                if(s.warn)btn.appendChild(el("span",{style:{fontSize:"9px",color:"#f59e0b",marginLeft:"auto"}},"⚠️"));
                scContent.appendChild(btn);
              });
              sDiv.appendChild(scContent);
            }
            gContent.appendChild(sDiv);
          });
          gDiv.appendChild(gContent);
        }
        content.appendChild(gDiv);
      });
    }
  }

  content.appendChild(el("div",{style:{marginTop:"20px",padding:"8px 12px",background:"rgba(255,255,255,0.02)",borderRadius:"8px",fontSize:"10px",color:"#4b5563",lineHeight:"1.8"}},
    "v3.1 · 2026/04 · 玉山官方公告核對 · 電信費：玉山星宇世界卡亦排除（官方明確公告）"));
  wrap.appendChild(content);
  app.appendChild(wrap);
  // Restore input focus
  const inp=app.querySelector("input");
  if(inp&&state.tab==="search"){inp.focus();inp.setSelectionRange(state.query.length,state.query.length);}
}

render();
</script>
</body>
</html>
