// ─── PROMO SYSTEM ────────────────────────────────────────────
const PROMO_KEY="mile_promos";
function getPromos(){try{return JSON.parse(localStorage.getItem(PROMO_KEY)||"[]");}catch{return[];}}
function savePromos(arr){localStorage.setItem(PROMO_KEY,JSON.stringify(arr));}
function todayStr(){return new Date().toISOString().slice(0,10);}
function activePromos(merchant){
  const today=todayStr();
  return getPromos().filter(p=>{
    const q=(merchant||"").toLowerCase();
    const pm=(p.merchant||"").toLowerCase();
    const hit=!pm||q.includes(pm)||pm.includes(q);
    return hit&&p.start<=today&&today<=p.end;
  });
}
function expiredPromos(){const t=todayStr();return getPromos().filter(p=>p.end<t);}
function allPromos(){return getPromos();}
function deletePromo(id){savePromos(getPromos().filter(p=>p.id!==id));}
function addPromo(promo){
  const arr=getPromos();
  promo.id=Date.now().toString(36)+Math.random().toString(36).slice(2,5);
  promo.added=todayStr();
  arr.unshift(promo);
  savePromos(arr);
}

function shouldRunMonthlyCheck(){
  const ts = localStorage.getItem(MONTHLY_TS_KEY);
  if(!ts) return true;
  const lastCheck = new Date(parseInt(ts));
  const now = new Date();
  return lastCheck.getMonth() !== now.getMonth() || lastCheck.getFullYear() !== now.getFullYear();
}

async function runMonthlyCheck(){
  const key = getKey();
  if(!key || ST.monthlyChecking) return;
  ST.monthlyChecking = true;
  render();

  const results = {};
  for(const q of MONTHLY_QUERIES){
    try{
      const resp = await fetch(apiEndpoint(),{
        method:"POST",
        headers:{"Content-Type":"application/json","x-api-key":key,"anthropic-version":"2023-06-01"},
        body: JSON.stringify({
          model:"claude-sonnet-4-20250514", max_tokens:1200,
          tools:[{type:"web_search_20250305",name:"web_search"}],
          messages:[{role:"user",content:q.prompt}]
        })
      });
      const d = await resp.json();
      const text = d.content?.filter(b=>b.type==="text").map(b=>b.text).join("") || "";
      try{ results[q.id] = JSON.parse(text.replace(/```json|```/g,"").trim()); }
      catch{ results[q.id] = {summary: text.slice(0,300), error:true}; }
    } catch(e){
      results[q.id] = {summary:`查詢失敗：${e.message}`, error:true};
    }
    await new Promise(r=>setTimeout(r,1000));
  }

  const checkResult = {
    ts: Date.now(),
    date: new Date().toLocaleDateString("zh-TW",{year:"numeric",month:"long",day:"numeric"}),
    results
  };
  localStorage.setItem(MONTHLY_CHECK_KEY, JSON.stringify(checkResult));
  localStorage.setItem(MONTHLY_TS_KEY, String(Date.now()));
  ST.monthlyCheck = checkResult;
  ST.monthlyChecking = false;
  render();
}

function getGoalScore(r){
  const g=ST.goal;
  if(g==="eva") return r.score;
  if(g==="china"){
    if(r.id==="ci") return r.score+3;        // 華航直入華夏，最強
    if(r.id==="hsbc") return r.score+1;      // 匯豐可換中華航空
    if(r.id==="starlux") return r.score-2;   // 只能換星宇
    if(r.id==="eva") return r.score-2;       // 只能換長榮
    return r.score;
  }
  if(g==="asia"){
    if(r.id==="hsbc") return r.score+3;      // 匯豐16+含國泰(亞萬)，最強
    if(r.id==="unicard") return r.score+2;   // Unicard可換亞萬
    if(r.id==="starlux") return r.score-2;   // 只能換星宇
    if(r.id==="ci") return r.score-1;        // 只換華夏
    return r.score;
  }
  if(g==="cash"){
    if(r.id==="ricard") return r.score+5;    // Richart折帳單最強現金
    if(r.id==="cube") return r.score+2;      // 小樹點可折帳
    if(r.id==="unicard") return r.score+1;   // e-point可折帳
    return r.score;
  }
  return r.score;
}

function goalLabel(){
  return GOALS.find(g=>g.id===ST.goal)||GOALS[0];
}
const MEDAL=["🏆","🥈","🥉","④","⑤","⑥"];

function el(tag,at,ch){
  const e=document.createElement(tag);
  if(at)Object.entries(at).forEach(([k,v])=>{
    if(k==="style"&&typeof v==="object")Object.assign(e.style,v);
    else if(k==="onClick")e.addEventListener("click",v);
    else if(k==="value"&&tag==="input")e.value=v;
    else if(k==="placeholder")e.placeholder=v;
    else if(k==="type")e.type=v;
    else e[k]=v;
  });
  [ch].flat().filter(c=>c!=null&&c!==false).forEach(c=>
    e.appendChild(typeof c==="string"?document.createTextNode(c):c));
  return e;
}
function sbar(score){

  if(gs>r.score&&r.score>0){

  // ⚠️ Unicard 非百大警示 badge

// ─── API 連線測試 ─────────────────────────────────────────────
async function testApiConnection(key,proxyUrl){
  const endpoint=(proxyUrl||"").trim()||"https://api.anthropic.com/v1/messages";
  try{
    const resp=await fetch(endpoint,{
      method:"POST",
      headers:{"Content-Type":"application/json","x-api-key":key.trim(),"anthropic-version":"2023-06-01"},
      body:JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:10,
        messages:[{role:"user",content:"Hi"}]})
    });
    if(resp.status===401)return{ok:false,msg:"❌ API Key 無效或已過期，請重新申請"};
    if(resp.status===403)return{ok:false,msg:"❌ API Key 無存取權限"};
    if(resp.ok)return{ok:true,msg:`✅ 連線成功！${endpoint.includes("anthropic.com")?"（直連）":"（經代理）"}`};
    return{ok:false,msg:`❌ HTTP ${resp.status} 錯誤`};
  }catch(e){
    if(e instanceof TypeError)
      return{ok:false,msg:"❌ 直連失敗（CORS/防火牆）\n→ 請填入 Cloudflare Worker 代理網址後再測試"};
    return{ok:false,msg:`❌ 連線錯誤：${e.message}`};
  }
}

// ─── 精確錯誤識別 ─────────────────────────────────────────────
// ─── 精確錯誤識別 ─────────────────────────────────────────────
function friendlyError(e){
  if(e instanceof TypeError||e.message==="Failed to fetch")
    return "網路連線失敗（Failed to fetch）\n\n可能原因：\n• 網路不穩，請稍後再試\n• 防火牆/代理攔截 api.anthropic.com\n• 請點🔑按鈕→「測試連線」確認";
  if(e.message.includes("401"))return "API Key 無效或過期，請重新設定";
  if(e.message.includes("403"))return "API Key 無存取權限";
  if(e.message.includes("429"))return "API 請求過於頻繁，請稍後再試";
  if(e.message==="NO_KEY")return "尚未設定 API Key";
  return e.message;
}

async function doLLM(){
  if(!ST.query.trim()||ST.loading)return;
  if(!getKey()){showKeyModal(doLLM);return;}
  ST.loading=true;ST.llm=null;render();
  try{ST.llm=await queryLLM(ST.query);}
  catch(e){
    if(e.message==="NO_KEY"){showKeyModal(doLLM);ST.loading=false;render();return;}
    ST.llm={category:"錯誤",recommendations:[],notes:friendlyError(e),mall_tip:null};
  }
  ST.loading=false;render();
}

async function doLiveSearch(){
  if(!ST.query.trim()||ST.liveLoading)return;
  if(!getKey()){showKeyModal(doLiveSearch);return;}
  ST.liveLoading=true;ST.live=null;render();
  try{ST.live=await liveSearchPromos(ST.query);}
  catch(e){
    if(e.message==="NO_KEY"){showKeyModal(doLiveSearch);ST.liveLoading=false;render();return;}
    ST.live={promos:[],summary:friendlyError(e),merchant_promo:null};
  }
  ST.liveLoading=false;render();
}

        if(ST.expG===group.id){

  // Don't re-focus on render() — only set focus on first load to avoid keyboard jump
}
