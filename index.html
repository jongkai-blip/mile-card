function search(q){
  if(!q.trim())return[];

  const r=new Set();
  Object.keys(idx).forEach(k=>{if(k.includes(lo)||lo.includes(k))idx[k].forEach(id=>r.add(id));});
  return SCENARIOS.filter(s=>r.has(s.id));
}

針對「${q}」，考慮用戶策略後，JSON推薦（不含代碼塊）：

  const resp=await fetch("https://api.anthropic.com/v1/messages",{
    method:"POST",
    headers:{"Content-Type":"application/json","x-api-key":key,"anthropic-version":"2023-06-01"},
    body:JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:700,system:sys,
      messages:[{role:"user",content:`「${q}」最佳刷卡方式`}]})
  });
  if(!resp.ok){const e=await resp.json();throw new Error(e.error?.message||resp.status);}

function el(tag,at,ch){
  const e=document.createElement(tag);
  if(at)Object.entries(at).forEach(([k,v])=>{
    if(k==="style"&&typeof v==="object")Object.assign(e.style,v);
    else if(k==="onClick")e.addEventListener("click",v);
    else if(k==="value"&&tag==="input")e.value=v;
    else if(k==="placeholder")e.placeholder=v;
    else if(k==="type")e.type=v;
    else e[k]=v;
  });
  [ch].flat().filter(c=>c!=null&&c!==false).forEach(c=>
    e.appendChild(typeof c==="string"?document.createTextNode(c):c));
  return e;
}
function sbar(score){
  const col=score>=9?"#4ade80":score>=7?"#60a5fa":score>=4?"#fbbf24":"#6b7280";
  const d=el("div",{style:{display:"flex",gap:"2px",marginTop:"3px"}});
  for(let i=0;i<10;i++)d.appendChild(el("div",{style:{width:"5px",height:"7px",borderRadius:"2px",background:i<score?col:"rgba(255,255,255,0.1)"}}));
  return d;
}
function ctag(id){
  const c=CARDS[id];if(!c)return document.createTextNode("");
  return el("span",{className:"tag",style:{background:c.bg,color:c.color,border:`1px solid ${c.color}33`}},c.tag);
}
function modeBadge(mode){
  if(!mode)return null;
  const ok={"集精選":1,"任意選":1,"玩旅刷":1,"UP選":1};
  if(mode==="預設"||mode==="天天刷"||mode==="簡單選"||mode==="超出任意選")
    return el("span",{className:"mode-def"},`⚪ ${mode}`);
  if(mode==="需切換"||mode==="出國例外")
    return el("span",{className:"mode-warn"},`↻ ${mode}`);
  if(ok[mode])return el("span",{className:"mode-ok"},`✓ 策略`);
  return null;
}
function rrow(r,rank){
  const c=CARDS[r.id];if(!c)return null;
  const top=rank===0&&r.score>0;
  const row=el("div",{className:"row",style:{background:top?c.bg:"rgba(255,255,255,0.03)",
    border:`1px solid ${top?c.color+"44":"rgba(255,255,255,0.07)"}`}});
  row.appendChild(el("div",{className:"row-bar",style:{background:r.score>0?c.color:"#374151"}}));
  row.appendChild(el("span",{style:{fontSize:rank<3?"20px":"14px",minWidth:"24px",textAlign:"center",marginLeft:"4px"}},MEDAL[rank]));
  const info=el("div",{style:{flex:"1",minWidth:"0"}});
  const tl=el("div",{style:{display:"flex",alignItems:"center",gap:"6px",marginBottom:"3px",flexWrap:"wrap"}});
  tl.appendChild(ctag(r.id));
  tl.appendChild(el("span",{style:{fontSize:"14px",color:r.score>0?c.color:"#6b7280",fontWeight:"600"}},c.short));
  if(r.mode){const mb=modeBadge(r.mode);if(mb)tl.appendChild(mb);}
  info.appendChild(tl);
  info.appendChild(el("div",{style:{fontSize:"13px",color:"#9ca3af",lineHeight:"1.5"}},r.note));
  if(r.warn)info.appendChild(el("div",{style:{fontSize:"12px",color:"#f59e0b",marginTop:"3px"}},r.warn));
  row.appendChild(info);
  const right=el("div",{style:{textAlign:"right",flexShrink:"0"}});
  right.appendChild(el("div",{style:{fontSize:"14px",fontWeight:"700",color:r.score>0?c.color:"#4b5563",whiteSpace:"nowrap"}},r.text));
  if(r.method&&r.method!=="—")right.appendChild(el("div",{style:{fontSize:"11px",color:"#6b7280",marginTop:"2px"}},r.method));
  right.appendChild(sbar(r.score));
  row.appendChild(right);
  return row;
}

    hdr.appendChild(el("span",{className:"tag",style:{background:c.bg,color:c.color,border:`1px solid ${c.color}44`,fontSize:"12px"}},c.tag));
    hdr.appendChild(el("span",{style:{fontSize:"16px",fontWeight:"700",color:c.color}},c.short));
    hdr.appendChild(el("span",{className:"mode-warn",style:{marginLeft:"auto"}},"⚠ 需設定"));
    card.appendChild(hdr);
    // default → target
    const change=el("div",{style:{display:"flex",gap:"8px",alignItems:"center",marginBottom:"10px"}});
    change.appendChild(el("div",{className:"mode-def"},`預設：${s.defaultMode}`));
    change.appendChild(el("span",{style:{color:"#6b7280",fontSize:"18px"}},"→"));
    change.appendChild(el("div",{className:"mode-ok"},`目標：${s.target}`));
    card.appendChild(change);
    // action
    card.appendChild(el("div",{style:{background:"rgba(0,0,0,0.3)",borderRadius:"10px",padding:"10px 12px",fontSize:"13px",color:"#d1d5db",lineHeight:"1.8",marginBottom:"10px",whiteSpace:"pre-line"}},
      `📱 操作：\n${s.action}`));
    // reward & note
    card.appendChild(el("div",{style:{fontSize:"13px",fontWeight:"700",color:c.color,marginBottom:"5px"}},`回饋：${s.reward}`));
    card.appendChild(el("div",{style:{fontSize:"12px",color:"#9ca3af",lineHeight:"1.7"}},s.note));
    // 任意選 8 stores
    if(stores){
      card.appendChild(el("div",{style:{fontSize:"12px",fontWeight:"700",color:"#818cf8",marginTop:"12px",marginBottom:"8px"}},"任意選 8 家（依序設定）"));
      stores.forEach(st=>{
        const sr=el("div",{style:{display:"flex",alignItems:"flex-start",gap:"10px",padding:"8px 10px",marginBottom:"5px",background:"rgba(0,0,0,0.25)",borderRadius:"9px"}});
        sr.appendChild(el("span",{style:{fontSize:"18px",flexShrink:"0"}},st.icon));
        const info=el("div",{style:{flex:"1"}});
        info.appendChild(el("div",{style:{display:"flex",alignItems:"center",gap:"7px"}},
          [el("span",{style:{fontSize:"13px",color:"#a3e635",fontWeight:"700"}},`${st.no}. ${st.name}`),
           el("span",{style:{fontSize:"10px",color:"#6b7280",background:"rgba(255,255,255,0.06)",padding:"1px 6px",borderRadius:"6px"}},st.category)]));
        info.appendChild(el("div",{style:{fontSize:"12px",color:"#9ca3af",marginTop:"2px"}},st.note));
        if(st.warn)info.appendChild(el("div",{style:{fontSize:"11px",color:"#f59e0b",marginTop:"2px"}},`⚠ ${st.warn}`));
        sr.appendChild(info);
        sr.appendChild(el("span",{style:{fontSize:"12px",fontWeight:"700",color:"#a3e635",flexShrink:"0"}},"3.5%"));
        card.appendChild(sr);
      });
    }
    div.appendChild(card);
  });

  // Exception
  div.appendChild(el("div",{className:"box",style:{background:"rgba(99,102,241,0.08)",border:"1px solid rgba(99,102,241,0.25)",color:"#a5b4fc"}},
    [el("span",{style:{fontWeight:"700",display:"block",marginBottom:"4px"}},"🌍 出國例外"),
     document.createTextNode("出國前將CUBE臨時切換「趣旅遊」3%（全球含EU）；回國後切回集精選。海外首選：星宇世界卡10元/哩（不需切換方案）。")]));

  // Richart scope clarification
  div.appendChild(el("div",{className:"box",style:{background:"rgba(251,191,36,0.06)",border:"1px solid rgba(251,191,36,0.25)",color:"#fde68a"}},
    [el("span",{style:{fontWeight:"700",display:"block",marginBottom:"4px"}},"✈ Richart 玩旅刷 使用場景"),
     document.createTextNode("專用於購買 JAL/ANA/新加坡航空/國泰航空/樂桃/酷航等（沒有持有聯名卡的航空）及雄獅/易遊等旅行社。\n不出國→星宇世界卡10元/哩已涵蓋全海外，Richart不需要出國刷。")]));
  return div;
}

function showKeyModal(cb){
  const mc=document.getElementById("mc");mc.innerHTML="";
  const bg=el("div",{className:"modal-bg",onClick:e=>{if(e.target===bg)mc.innerHTML="";}});
  const box=el("div",{className:"modal"});
  box.appendChild(el("div",{style:{fontSize:"19px",fontWeight:"700",marginBottom:"8px"}},"🔑 Anthropic API Key"));
  box.appendChild(el("div",{style:{fontSize:"13px",color:"#9ca3af",marginBottom:"16px",lineHeight:"1.7"}},
    "AI搜尋需要 Anthropic API Key。\n申請：console.anthropic.com → API Keys\nKey 存在裝置 localStorage。"));
  const inp=el("input",{type:"password",placeholder:"sk-ant-api03-...",
    style:{width:"100%",background:"rgba(255,255,255,0.06)",border:"1px solid rgba(255,255,255,0.15)",
      borderRadius:"10px",padding:"13px 14px",fontSize:"15px",color:"#e8eaf0",outline:"none",marginBottom:"12px"},
    value:getKey()});
  box.appendChild(inp);
  const btnRow=el("div",{style:{display:"flex",gap:"8px"}});
  btnRow.appendChild(el("button",{onClick:()=>mc.innerHTML="",style:{flex:"1",padding:"13px",background:"rgba(255,255,255,0.06)",border:"1px solid rgba(255,255,255,0.1)",borderRadius:"10px",fontSize:"14px",color:"#9ca3af"}},"取消"));
  btnRow.appendChild(el("button",{onClick:()=>{const v=inp.value.trim();if(!v)return;setKey(v);mc.innerHTML="";if(cb)cb();},
    style:{flex:"2",padding:"13px",background:"rgba(99,102,241,0.85)",border:"none",borderRadius:"10px",fontSize:"14px",fontWeight:"700",color:"white"}},"儲存並搜尋"));
  box.appendChild(btnRow);
  if(getKey())box.appendChild(el("button",{onClick:()=>{setKey("");mc.innerHTML="";render();},
    style:{width:"100%",marginTop:"10px",padding:"8px",background:"transparent",border:"none",fontSize:"13px",color:"#6b7280"}},"清除 Key"));
  bg.appendChild(box);mc.appendChild(bg);
}

async function doLLM(){
  if(!ST.query.trim()||ST.loading)return;
  if(!getKey()){showKeyModal(doLLM);return;}
  ST.loading=true;ST.llm=null;render();
  try{ST.llm=await queryLLM(ST.query);}
  catch(e){
    if(e.message==="NO_KEY"){showKeyModal(doLLM);ST.loading=false;render();return;}
    ST.llm={category:"錯誤",recommendations:[],notes:`API錯誤：${e.message}`,mall_tip:null};
  }
  ST.loading=false;render();
}

function render(){
  const app=document.getElementById("app");app.innerHTML="";
  const wrap=el("div",{});

  // Header
  const hdr=el("div",{style:{padding:"20px 18px 14px",background:"linear-gradient(160deg,#0e1524,#111827)"}});
  hdr.appendChild(el("div",{style:{fontSize:"11px",letterSpacing:"4px",color:"#6b7280",textTransform:"uppercase",marginBottom:"4px"}},"Mileage Optimizer v3.4"));
  hdr.appendChild(el("div",{style:{fontSize:"22px",fontWeight:"700"}},"哩程刷卡智慧助理"));
  hdr.appendChild(el("div",{style:{fontSize:"12px",color:"#6b7280",marginTop:"3px"}},"任意選免費 > UP選・Richart專攻國內非聯名航空"));
  wrap.appendChild(hdr);

  // Tabs
  const tabs=el("div",{style:{display:"flex",borderBottom:"1px solid rgba(255,255,255,0.08)",background:"#0a0d14"}});
  [["search","🔍 搜尋"],["strategy","📌 策略"],["browse","📂 瀏覽"]].forEach(([t,l])=>
    tabs.appendChild(el("button",{onClick:()=>{ST.tab=t;ST.sel=null;render();},
      style:{flex:"1",padding:"12px 0",fontSize:"13px",fontWeight:"600",background:"transparent",border:"none",
        borderBottom:`2px solid ${ST.tab===t?"#818cf8":"transparent"}`,color:ST.tab===t?"#a5b4fc":"#6b7280"}},l)));
  wrap.appendChild(tabs);

  if(ST.tab==="strategy"){wrap.appendChild(strategyPanel());app.appendChild(wrap);return;}

  const cnt=el("div",{style:{padding:"16px 16px 60px"}});

  // Mini strategy banner
  const banner=el("div",{style:{display:"flex",gap:"6px",flexWrap:"wrap",marginBottom:"14px"}});
  [{id:"cube",label:"CUBE",mode:"集精選"},{id:"unicard",label:"UNI",mode:"任意選8家"},{id:"ricard",label:"TSB",mode:"玩旅刷"}].forEach(b=>{
    const c=CARDS[b.id];
    banner.appendChild(el("div",{onClick:()=>{ST.tab="strategy";render();},
      style:{display:"flex",alignItems:"center",gap:"5px",padding:"4px 10px",borderRadius:"10px",
        background:"rgba(255,255,255,0.04)",border:"1px solid rgba(255,255,255,0.08)",cursor:"pointer"}},
      [el("span",{style:{fontSize:"11px",fontWeight:"700",color:c.color}},b.label),
       el("span",{className:"mode-ok",style:{fontSize:"10px"}},b.mode)]));
  });
  banner.appendChild(el("div",{style:{fontSize:"11px",color:"#4b5563",alignSelf:"center",marginLeft:"auto"}},"⚠ 均非預設"));
  cnt.appendChild(banner);

  if(ST.tab==="search"){
    const iw=el("div",{style:{position:"relative",marginBottom:"14px"}});
    const inp=el("input",{placeholder:"輸入消費場所（高鐵、樂子、星巴克…）",
      style:{width:"100%",background:"rgba(255,255,255,0.06)",border:"1px solid rgba(255,255,255,0.09)",
        borderRadius:"14px",padding:"14px 110px 14px 16px",fontSize:"16px",color:"#e8eaf0",outline:"none"},value:ST.query});
    inp.addEventListener("input",e=>{ST.query=e.target.value;ST.sel=null;ST.llm=null;ST.results=ST.query.trim()?search(ST.query):[];render();});
    iw.appendChild(inp);
    iw.appendChild(el("button",{onClick:doLLM,style:{position:"absolute",right:"7px",top:"50%",transform:"translateY(-50%)",
      background:ST.query.trim()&&!ST.loading?"rgba(99,102,241,0.85)":"rgba(99,102,241,0.25)",
      border:"none",borderRadius:"10px",padding:"8px 13px",fontSize:"13px",fontWeight:"700",color:"#e8eaf0",whiteSpace:"nowrap"}},
      ST.loading?"⏳ AI中...":"🤖 AI搜尋"));
    cnt.appendChild(iw);
    if(!getKey())cnt.appendChild(el("div",{style:{fontSize:"12px",color:"#6b7280",marginBottom:"12px"}},
      ["🔑 AI搜尋需設定 API Key ",el("button",{onClick:()=>showKeyModal(doLLM),style:{fontSize:"12px",color:"#818cf8",background:"none",border:"none",textDecoration:"underline"}},"設定")]));

    if(ST.sel){
      const bb=el("div",{style:{display:"flex",alignItems:"center",gap:"10px",marginBottom:"14px"}});
      bb.appendChild(el("button",{onClick:()=>{ST.sel=null;render();},style:{background:"rgba(255,255,255,0.05)",border:"1px solid rgba(255,255,255,0.09)",borderRadius:"10px",padding:"6px 14px",fontSize:"14px",color:"#9ca3af"}},"← 返回"));
      bb.appendChild(el("span",{style:{fontSize:"22px"}},ST.sel.icon));
      bb.appendChild(el("span",{style:{fontSize:"17px",fontWeight:"700"}},ST.sel.name));
      cnt.appendChild(bb);cnt.appendChild(spanel(ST.sel));
    } else if(ST.results.length&&!ST.llm){
      cnt.appendChild(el("div",{style:{fontSize:"12px",letterSpacing:"2px",color:"#4b5563",textTransform:"uppercase",marginBottom:"10px"}},`找到 ${ST.results.length} 個場域`));
      ST.results.forEach(s=>{
        const btn=el("button",{onClick:()=>{ST.sel=s;render();},style:{width:"100%",textAlign:"left",background:"rgba(255,255,255,0.04)",border:"1px solid rgba(255,255,255,0.08)",borderRadius:"12px",padding:"13px 14px",display:"flex",alignItems:"center",gap:"12px",marginBottom:"7px"}});
        btn.appendChild(el("span",{style:{fontSize:"24px"}},s.icon));
        const t=el("div",{style:{flex:"1"}});
        t.appendChild(el("div",{style:{fontSize:"15px",color:"#e8eaf0",fontWeight:"600"}},s.name));
        t.appendChild(el("div",{style:{fontSize:"13px",color:"#6b7280",marginTop:"2px"}},s.group));
        btn.appendChild(t);
        if(s.warn)btn.appendChild(el("span",{style:{fontSize:"16px"}},"⚠️"));
        cnt.appendChild(btn);
      });
    } else if(ST.query.trim()&&!ST.llm&&!ST.loading){
      const nr=el("div",{style:{textAlign:"center",padding:"32px 0",color:"#6b7280"}});
      nr.appendChild(el("div",{style:{fontSize:"36px",marginBottom:"10px"}},"🤖"));
      nr.appendChild(el("div",{style:{fontSize:"15px",marginBottom:"14px"}},`找不到「${ST.query}」`));
      nr.appendChild(el("button",{onClick:doLLM,style:{background:"rgba(99,102,241,0.85)",border:"none",borderRadius:"12px",padding:"13px 24px",fontSize:"15px",fontWeight:"700",color:"white"}},"啟動 AI 分析"));
      cnt.appendChild(nr);
    } else if(ST.loading){
      cnt.appendChild(el("div",{style:{textAlign:"center",padding:"44px 0",color:"#6b7280"}},[el("div",{style:{fontSize:"36px",marginBottom:"10px"}},"⏳"),el("div",{style:{fontSize:"15px"}},"AI分析中...")]));
    } else if(ST.llm){
      const ai=el("div",{});
      const ah=el("div",{style:{display:"flex",alignItems:"center",gap:"10px",marginBottom:"12px"}});
      ah.appendChild(document.createTextNode("🤖"));
      ah.appendChild(el("span",{style:{fontSize:"15px",color:"#818cf8",fontWeight:"600"}},`AI分析：${ST.llm.category}`));
      ah.appendChild(el("button",{onClick:()=>{ST.llm=null;render();},style:{marginLeft:"auto",background:"none",border:"none",color:"#6b7280",fontSize:"22px"}},"×"));
      ai.appendChild(ah);
      if(ST.llm.notes)ai.appendChild(el("div",{className:"box",style:{background:"rgba(239,68,68,0.08)",border:"1px solid rgba(239,68,68,0.2)",color:"#fca5a5"}},`⚠ ${ST.llm.notes}`));
      (ST.llm.recommendations||[]).forEach((r,i)=>{
        const row=el("div",{style:{background:"rgba(255,255,255,0.04)",border:"1px solid rgba(255,255,255,0.08)",borderRadius:"12px",padding:"13px 14px",marginBottom:"7px"}});
        const top=el("div",{style:{display:"flex",alignItems:"center",gap:"10px",marginBottom:"5px"}});
        top.appendChild(el("span",{style:{fontSize:i<3?"20px":"15px"}},MEDAL[i]));
        top.appendChild(el("span",{style:{fontSize:"15px",fontWeight:"700",color:"#a5b4fc"}},r.card));
        if(r.payment&&r.payment!=="直刷")top.appendChild(el("span",{style:{fontSize:"12px",color:"#6b7280",background:"rgba(255,255,255,0.05)",padding:"2px 8px",borderRadius:"8px"}},r.payment));
        row.appendChild(top);
        row.appendChild(el("div",{style:{fontSize:"15px",fontWeight:"700",color:"#4ade80",marginBottom:"4px"}},r.reward));
        row.appendChild(el("div",{style:{fontSize:"13px",color:"#9ca3af",lineHeight:"1.6"}},r.reason));
        ai.appendChild(row);
      });
      cnt.appendChild(ai);
    } else {
      const emp=el("div",{style:{textAlign:"center",padding:"30px 0"}});
      emp.appendChild(el("div",{style:{fontSize:"44px",marginBottom:"12px"}},"✈️"));
      emp.appendChild(el("div",{style:{fontSize:"16px",color:"#6b7280",marginBottom:"6px"}},"輸入任意消費場所"));
      emp.appendChild(el("div",{style:{fontSize:"13px",color:"#4b5563"}},"例：高鐵、星巴克、王品、家樂福…"));
      cnt.appendChild(emp);
    }
  } else {
    // browse
    if(ST.sel){
      const bb=el("div",{style:{display:"flex",alignItems:"center",gap:"10px",marginBottom:"14px"}});
      bb.appendChild(el("button",{onClick:()=>{ST.sel=null;render();},style:{background:"rgba(255,255,255,0.05)",border:"1px solid rgba(255,255,255,0.09)",borderRadius:"10px",padding:"6px 14px",fontSize:"14px",color:"#9ca3af"}},"← 返回"));
      bb.appendChild(el("span",{style:{fontSize:"22px"}},ST.sel.icon));
      bb.appendChild(el("span",{style:{fontSize:"17px",fontWeight:"700"}},ST.sel.name));
      cnt.appendChild(bb);cnt.appendChild(spanel(ST.sel));
    } else {
      GROUPS.forEach(group=>{
        const gd=el("div",{style:{marginBottom:"9px"}});
        const gb=el("button",{onClick:()=>{ST.expG=ST.expG===group.id?null:group.id;render();},
          style:{width:"100%",textAlign:"left",background:"rgba(255,255,255,0.04)",border:"1px solid rgba(255,255,255,0.08)",borderRadius:"14px",padding:"14px 16px",display:"flex",alignItems:"center",gap:"12px"}});
        gb.appendChild(el("span",{style:{fontSize:"24px"}},group.icon));
        gb.appendChild(el("span",{style:{fontSize:"16px",fontWeight:"700",color:"#e8eaf0"}},group.name));
        gb.appendChild(el("span",{style:{marginLeft:"auto",color:"#6b7280",fontSize:"18px"}},ST.expG===group.id?"▲":"▼"));
        gd.appendChild(gb);
        if(ST.expG===group.id){
          const gc=el("div",{style:{marginTop:"5px",marginLeft:"10px"}});
          group.subs.forEach(sub=>{
            const scs=SCENARIOS.filter(s=>s.group===sub);if(!scs.length)return;
            const sd=el("div",{style:{marginBottom:"5px"}});
            const sb=el("button",{onClick:()=>{ST.expS=ST.expS===sub?null:sub;render();},
              style:{width:"100%",textAlign:"left",background:"rgba(255,255,255,0.02)",border:"1px solid rgba(255,255,255,0.07)",borderRadius:"12px",padding:"11px 14px",display:"flex",alignItems:"center",gap:"9px"}});
            sb.appendChild(el("span",{style:{fontSize:"13px",color:"#818cf8",fontWeight:"600"}},sub));
            sb.appendChild(el("span",{style:{fontSize:"12px",color:"#4b5563"}},`(${scs.length})`));
            sb.appendChild(el("span",{style:{marginLeft:"auto",color:"#6b7280",fontSize:"16px"}},ST.expS===sub?"▲":"▼"));
            sd.appendChild(sb);
            if(ST.expS===sub){
              const sc2=el("div",{style:{marginTop:"5px",marginLeft:"10px"}});
              scs.forEach(s=>{
                const btn=el("button",{onClick:()=>{ST.sel=s;render();},
                  style:{width:"100%",textAlign:"left",background:"rgba(255,255,255,0.02)",border:"1px solid rgba(255,255,255,0.07)",borderRadius:"10px",padding:"10px 13px",display:"flex",alignItems:"center",gap:"10px",marginBottom:"5px"}});
                btn.appendChild(el("span",{style:{fontSize:"20px"}},s.icon));
                btn.appendChild(el("span",{style:{fontSize:"14px",color:"#d1d5db",flex:"1"}},s.name));
                if(s.warn)btn.appendChild(el("span",{style:{fontSize:"12px",color:"#f59e0b"}},"⚠️"));
                sc2.appendChild(btn);
              });sd.appendChild(sc2);
            }
            gc.appendChild(sd);
          });gd.appendChild(gc);
        }cnt.appendChild(gd);
      });
    }
  }
  wrap.appendChild(cnt);app.appendChild(wrap);
  app.appendChild(el("button",{onClick:()=>showKeyModal(doLLM),style:{position:"fixed",bottom:"20px",right:"20px",
    width:"54px",height:"54px",borderRadius:"50%",
    background:getKey()?"rgba(99,102,241,0.9)":"rgba(99,102,241,0.4)",
    border:"none",fontSize:"24px",boxShadow:"0 4px 20px rgba(0,0,0,0.5)",zIndex:"50"}},"🔑"));
  if(ST.tab==="search"){const i2=app.querySelector("input");if(i2)setTimeout(()=>{i2.focus();i2.setSelectionRange(ST.query.length,ST.query.length);},50);}
}
render();
</script>
